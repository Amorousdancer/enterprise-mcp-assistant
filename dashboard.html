<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LightAgent — Developer Console</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwindcss.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: {
              0: '#09090b',
              1: '#111114',
              2: '#18181c',
              3: '#1f1f24',
              4: '#27272d',
            },
            accent: {
              DEFAULT: '#6366f1',
              dim: '#4f46e5',
              glow: 'rgba(99,102,241,0.15)',
            },
            mint: '#34d399',
            amber: '#fbbf24',
            rose: '#fb7185',
          },
          fontFamily: {
            sans: ['"Inter"', '"SF Pro Display"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', '"Fira Code"', 'monospace'],
          },
          keyframes: {
            'fade-in': { from: { opacity: '0', transform: 'translateY(8px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
            'pulse-dot': { '0%,100%': { opacity: '0.4' }, '50%': { opacity: '1' } },
            'shimmer': { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
            'slide-in-right': { from: { opacity: '0', transform: 'translateX(12px)' }, to: { opacity: '1', transform: 'translateX(0)' } },
            'typewriter': { from: { width: '0' }, to: { width: '100%' } },
            'glow-ring': { '0%': { boxShadow: '0 0 0 0 rgba(99,102,241,0.4)' }, '70%': { boxShadow: '0 0 0 6px rgba(99,102,241,0)' }, '100%': { boxShadow: '0 0 0 0 rgba(99,102,241,0)' } },
          },
          animation: {
            'fade-in': 'fade-in 0.4s ease-out forwards',
            'pulse-dot': 'pulse-dot 1.4s ease-in-out infinite',
            'shimmer': 'shimmer 2s linear infinite',
            'slide-in-right': 'slide-in-right 0.35s ease-out forwards',
            'glow-ring': 'glow-ring 2s ease-in-out infinite',
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; background: #09090b; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #27272d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    .glass { background: rgba(17,17,20,0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    .gradient-border { position: relative; }
    .gradient-border::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
      background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(52,211,153,0.15), transparent 60%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
    }
    .shimmer-bg {
      background: linear-gradient(90deg, transparent 0%, rgba(99,102,241,0.06) 50%, transparent 100%);
      background-size: 200% 100%; animation: shimmer 2s linear infinite;
    }
    .thought-line { animation: fade-in 0.35s ease-out forwards; opacity: 0; }
    .chat-bubble { animation: fade-in 0.3s ease-out forwards; opacity: 0; }
    @keyframes typing { from { opacity: .2 } to { opacity: 1 } }
    .typing-cursor::after {
      content: '▍'; color: #6366f1; animation: typing 0.8s ease-in-out infinite; margin-left: 2px;
    }
    .noise {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    }
    .mcp-glow { box-shadow: 0 0 20px -5px rgba(99,102,241,0.25); }
  </style>
</head>
<body class="dark text-zinc-300 font-sans noise">
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

/* ─── Icons (inline SVG) ─── */
const Icon = {
  Send: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
  Bot: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>,
  User: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  Zap: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
  Brain: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a4 4 0 0 1 4 4c0 1.1-.5 2.1-1.2 2.8A5 5 0 0 1 18 14a5 5 0 0 1-4 4.9V22h-4v-3.1A5 5 0 0 1 6 14a5 5 0 0 1 2.2-4.2A4 4 0 0 1 7 6a4 4 0 0 1 5-4z"/></svg>,
  Tool: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>,
  Clock: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  Token: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>,
  Check: () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
  ChevronRight: () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
  Sparkles: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z"/><path d="M18 14l.75 2.25L21 17l-2.25.75L18 20l-.75-2.25L15 17l2.25-.75z"/></svg>,
  Wrench: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>,
  Activity: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
  Layers: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
  Terminal: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>,
};

/* ─── Mock Data ─── */
const MOCK_THOUGHTS = [
  { id: 1, type: 'reasoning', text: '分析用户需求：需要查询天气信息并生成可视化报告', time: '0.2s', status: 'done' },
  { id: 2, type: 'decision', text: '决定调用 weather_api 获取实时数据，然后用 chart_renderer 生成图表', time: '0.5s', status: 'done' },
  { id: 3, type: 'tool_call', text: '准备调用 MCP: weather_api.get_forecast({ city: "Shanghai", days: 7 })', time: '0.8s', status: 'done' },
  { id: 4, type: 'observation', text: '天气数据获取成功：7天预报数据，包含温度、湿度、风速', time: '1.2s', status: 'done' },
  { id: 5, type: 'reasoning', text: '数据分析完成，最高温 34°C，建议用户携带防晒用品', time: '1.6s', status: 'done' },
  { id: 6, type: 'tool_call', text: '准备调用 MCP: chart_renderer.create_line_chart({ data: temp_series, theme: "dark" })', time: '2.0s', status: 'active' },
];

const MOCK_TOOLS = [
  { name: 'weather_api.get_forecast', status: 'success', duration: '342ms', tokens: 1280, server: 'Weather MCP' },
  { name: 'chart_renderer.create_line_chart', status: 'running', duration: '—', tokens: 0, server: 'Viz MCP' },
  { name: 'memory_store.query', status: 'idle', duration: '—', tokens: 0, server: 'Memory MCP' },
];

const MOCK_MESSAGES = [
  { role: 'user', content: '帮我查一下上海未来一周的天气，然后生成一个温度趋势图' },
  { role: 'assistant', content: '好的，我来为你查询上海的天气数据并生成可视化图表。\n\n首先让我调用天气 API 获取实时数据...', thinking: true },
];

const CHAT_HISTORY = [
  { role: 'user', content: '帮我查一下上海未来一周的天气，然后生成一个温度趋势图' },
  { role: 'assistant', content: '好的，我来为你查询上海的天气数据并生成可视化图表。\n\n首先让我调用天气 API 获取实时数据...' },
  { role: 'assistant', content: '天气数据已获取！上海未来一周气温在 26°C ~ 34°C 之间波动，周四有雷阵雨。\n\n正在为你生成温度趋势图...', type: 'tool_result' },
];

/* ─── Status Badge ─── */
function StatusBadge({ status }) {
  const map = {
    done:     { bg: 'bg-emerald-500/10', text: 'text-emerald-400', dot: 'bg-emerald-400', label: '完成' },
    active:   { bg: 'bg-indigo-500/10',  text: 'text-indigo-400',  dot: 'bg-indigo-400',  label: '执行中' },
    running:  { bg: 'bg-indigo-500/10',  text: 'text-indigo-400',  dot: 'bg-indigo-400 animate-pulse-dot', label: '运行中' },
    idle:     { bg: 'bg-zinc-500/10',    text: 'text-zinc-500',    dot: 'bg-zinc-500',    label: '待命' },
    error:    { bg: 'bg-rose-500/10',    text: 'text-rose-400',    dot: 'bg-rose-400',    label: '错误' },
    success:  { bg: 'bg-emerald-500/10', text: 'text-emerald-400', dot: 'bg-emerald-400', label: '成功' },
  };
  const s = map[status] || map.idle;
  return (
    <span className={`inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[11px] font-medium ${s.bg} ${s.text}`}>
      <span className={`w-1.5 h-1.5 rounded-full ${s.dot}`} />
      {s.label}
    </span>
  );
}

/* ─── Metric Card ─── */
function MetricCard({ icon: IconComp, label, value, sub, color = 'text-zinc-300' }) {
  return (
    <div className="glass gradient-border rounded-xl p-3.5 flex flex-col gap-1.5 hover:bg-surface-2/80 transition-colors duration-200">
      <div className="flex items-center gap-2 text-zinc-500">
        <IconComp />
        <span className="text-[11px] font-medium uppercase tracking-wider">{label}</span>
      </div>
      <div className={`text-xl font-semibold ${color} font-mono`}>{value}</div>
      {sub && <div className="text-[11px] text-zinc-600">{sub}</div>}
    </div>
  );
}

/* ─── Thought Chain Item ─── */
function ThoughtItem({ thought, index }) {
  const typeConfig = {
    reasoning:   { icon: Icon.Brain, color: 'text-indigo-400', bg: 'bg-indigo-500/8', border: 'border-indigo-500/20', label: '推理' },
    decision:    { icon: Icon.Sparkles, color: 'text-amber-400', bg: 'bg-amber-500/8', border: 'border-amber-500/20', label: '决策' },
    tool_call:   { icon: Icon.Wrench, color: 'text-cyan-400', bg: 'bg-cyan-500/8', border: 'border-cyan-500/20', label: '工具调用' },
    observation: { icon: Icon.Activity, color: 'text-emerald-400', bg: 'bg-emerald-500/8', border: 'border-emerald-500/20', label: '观察' },
  };
  const cfg = typeConfig[thought.type] || typeConfig.reasoning;
  const IconComp = cfg.icon;

  return (
    <div className="thought-line" style={{ animationDelay: `${index * 120}ms` }}>
      <div className={`relative flex gap-3 p-3 rounded-lg border ${cfg.border} ${cfg.bg} hover:bg-opacity-100 transition-all duration-200 group`}>
        <div className={`mt-0.5 flex-shrink-0 ${cfg.color}`}><IconComp /></div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 mb-1">
            <span className={`text-[11px] font-semibold ${cfg.color} uppercase tracking-wider`}>{cfg.label}</span>
            <span className="text-[10px] text-zinc-600 font-mono">#{String(thought.id).padStart(3, '0')}</span>
            <span className="ml-auto text-[10px] text-zinc-600 font-mono">{thought.time}</span>
            {thought.status === 'done' && <span className="text-emerald-500"><Icon.Check /></span>}
            {thought.status === 'active' && <span className="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-pulse-dot" />}
          </div>
          <p className="text-[13px] text-zinc-400 leading-relaxed font-mono">{thought.text}</p>
        </div>
      </div>
      {index < MOCK_THOUGHTS.length - 1 && (
        <div className="flex justify-start ml-5 py-1">
          <div className="w-px h-4 bg-gradient-to-b from-zinc-700 to-transparent" />
        </div>
      )}
    </div>
  );
}

/* ─── MCP Tool Card ─── */
function ToolCard({ tool, index }) {
  return (
    <div
      className="animate-slide-in-right glass gradient-border rounded-lg p-3 hover:bg-surface-2/80 transition-all duration-200"
      style={{ animationDelay: `${index * 80}ms` }}
    >
      <div className="flex items-start justify-between mb-2">
        <div className="flex items-center gap-2">
          <div className="w-6 h-6 rounded-md bg-indigo-500/10 flex items-center justify-center">
            <Icon.Terminal />
          </div>
          <div>
            <div className="text-[12px] font-mono font-medium text-zinc-300">{tool.name}</div>
            <div className="text-[10px] text-zinc-600">{tool.server}</div>
          </div>
        </div>
        <StatusBadge status={tool.status} />
      </div>
      <div className="flex items-center gap-4 mt-2 text-[11px] text-zinc-500">
        <span className="flex items-center gap-1"><Icon.Clock /> {tool.duration}</span>
        <span className="flex items-center gap-1"><Icon.Token /> {tool.tokens > 0 ? `${tool.tokens} tok` : '—'}</span>
      </div>
      {tool.status === 'running' && (
        <div className="mt-2.5 h-1 rounded-full bg-surface-3 overflow-hidden">
          <div className="h-full w-2/3 rounded-full bg-gradient-to-r from-indigo-500 to-cyan-400 animate-shimmer" style={{ backgroundSize: '200% 100%' }} />
        </div>
      )}
    </div>
  );
}

/* ─── Chat Bubble ─── */
function ChatBubble({ msg, index }) {
  const isUser = msg.role === 'user';
  return (
    <div className={`chat-bubble flex gap-3 ${isUser ? 'flex-row-reverse' : ''}`} style={{ animationDelay: `${index * 100}ms` }}>
      <div className={`flex-shrink-0 w-7 h-7 rounded-lg flex items-center justify-center text-zinc-400 ${isUser ? 'bg-zinc-700/60' : 'bg-indigo-500/15 text-indigo-400'}`}>
        {isUser ? <Icon.User /> : <Icon.Bot />}
      </div>
      <div className={`max-w-[80%] rounded-2xl px-4 py-2.5 text-[13px] leading-relaxed ${
        isUser
          ? 'bg-surface-3 text-zinc-200 rounded-tr-md'
          : 'bg-surface-2 border border-zinc-800/60 text-zinc-300 rounded-tl-md'
      }`}>
        <div className="whitespace-pre-wrap">{msg.content}</div>
        {msg.type === 'tool_result' && (
          <div className="mt-2 pt-2 border-t border-zinc-800/40 flex items-center gap-2 text-[11px] text-zinc-500">
            <Icon.Tool /> <span>weather_api.get_forecast</span>
            <StatusBadge status="success" />
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── Section Header ─── */
function SectionHeader({ icon: IconComp, title, count }) {
  return (
    <div className="flex items-center gap-2 mb-3">
      <div className="w-5 h-5 rounded-md bg-surface-3 flex items-center justify-center text-zinc-500">
        <IconComp />
      </div>
      <h3 className="text-[12px] font-semibold text-zinc-400 uppercase tracking-wider">{title}</h3>
      {count !== undefined && (
        <span className="ml-auto text-[10px] text-zinc-600 bg-surface-3 px-1.5 py-0.5 rounded-full font-mono">{count}</span>
      )}
    </div>
  );
}

/* ─── Main Dashboard ─── */
function Dashboard() {
  const [messages, setMessages] = useState(CHAT_HISTORY);
  const [input, setInput] = useState('');
  const [thoughts, setThoughts] = useState(MOCK_THOUGHTS);
  const [tools, setTools] = useState(MOCK_TOOLS);
  const [isThinking, setIsThinking] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const [totalTokens, setTotalTokens] = useState(24856);
  const chatEndRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);

  useEffect(() => {
    if (!isThinking) return;
    const interval = setInterval(() => setElapsed(p => p + 100), 100);
    return () => clearInterval(interval);
  }, [isThinking]);

  const formatTime = (ms) => {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    return m > 0 ? `${m}m ${s % 60}s` : `${s}.${Math.floor((ms % 1000) / 100)}s`;
  };

  const handleSend = useCallback(() => {
    if (!input.trim()) return;
    const userMsg = { role: 'user', content: input.trim() };
    setMessages(prev => [...prev, userMsg]);
    setInput('');
    setIsThinking(true);
    setElapsed(0);

    // Simulate agent response
    setTimeout(() => {
      setIsThinking(false);
      setMessages(prev => [...prev, {
        role: 'assistant',
        content: '收到你的请求！这是一个模拟的 Agent 响应。在真实场景中，这里会连接到你的 LightAgent 后端服务，实时展示 Agent 的思考过程和工具调用情况。',
      }]);
      setTotalTokens(prev => prev + 1250);
    }, 3500);
  }, [input]);

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  };

  return (
    <div className="h-screen flex flex-col bg-surface-0 overflow-hidden">
      {/* ─── Top Bar ─── */}
      <header className="flex-shrink-0 h-12 border-b border-zinc-800/60 flex items-center px-5 gap-4 glass">
        <div className="flex items-center gap-2.5">
          <div className="w-6 h-6 rounded-lg bg-gradient-to-br from-indigo-500 to-cyan-400 flex items-center justify-center">
            <Icon.Zap />
          </div>
          <span className="text-[13px] font-semibold text-zinc-200 tracking-tight">LightAgent</span>
          <span className="text-[10px] text-zinc-600 bg-surface-3 px-2 py-0.5 rounded-full font-mono">v0.3.1</span>
        </div>
        <div className="flex-1" />
        <div className="flex items-center gap-3">
          <div className="flex items-center gap-1.5 text-[11px] text-zinc-500">
            <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse" />
            <span>Agent Online</span>
          </div>
          <div className="h-4 w-px bg-zinc-800" />
          <div className="text-[11px] text-zinc-600 font-mono">model: gpt-4o · mcp: 3 servers</div>
        </div>
      </header>

      {/* ─── Main Content ─── */}
      <div className="flex-1 flex min-h-0">

        {/* ═══ LEFT: Chat Panel ═══ */}
        <div className="flex-1 flex flex-col min-w-0 border-r border-zinc-800/40">
          {/* Chat Messages */}
          <div className="flex-1 overflow-y-auto px-6 py-5 space-y-4">
            {messages.map((msg, i) => <ChatBubble key={i} msg={msg} index={i} />)}

            {isThinking && (
              <div className="chat-bubble flex gap-3" style={{ animationDelay: '100ms' }}>
                <div className="flex-shrink-0 w-7 h-7 rounded-lg bg-indigo-500/15 flex items-center justify-center text-indigo-400 animate-glow-ring">
                  <Icon.Bot />
                </div>
                <div className="bg-surface-2 border border-zinc-800/60 rounded-2xl rounded-tl-md px-4 py-3">
                  <div className="flex items-center gap-2 text-[12px] text-indigo-400">
                    <span className="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-pulse-dot" />
                    <span>Agent 正在思考</span>
                    <span className="text-zinc-600 font-mono">{formatTime(elapsed)}</span>
                  </div>
                  <div className="mt-2 flex gap-1">
                    {[0,1,2].map(i => (
                      <div key={i} className="w-1.5 h-1.5 rounded-full bg-zinc-600 animate-pulse-dot" style={{ animationDelay: `${i * 200}ms` }} />
                    ))}
                  </div>
                </div>
              </div>
            )}
            <div ref={chatEndRef} />
          </div>

          {/* Input Bar */}
          <div className="flex-shrink-0 px-5 pb-4 pt-2">
            <div className="glass gradient-border rounded-xl flex items-end gap-2 px-4 py-3">
              <textarea
                ref={inputRef}
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder="输入消息与 Agent 交互..."
                rows={1}
                className="flex-1 bg-transparent text-[13px] text-zinc-200 placeholder-zinc-600 resize-none outline-none max-h-32 leading-relaxed"
                style={{ fieldSizing: 'content' }}
              />
              <button
                onClick={handleSend}
                disabled={!input.trim()}
                className="flex-shrink-0 w-8 h-8 rounded-lg bg-indigo-500 hover:bg-indigo-400 disabled:bg-surface-3 disabled:text-zinc-600 text-white flex items-center justify-center transition-all duration-200 hover:scale-105 active:scale-95"
              >
                <Icon.Send />
              </button>
            </div>
            <div className="mt-2 flex items-center justify-between px-1">
              <div className="text-[10px] text-zinc-600">Enter 发送 · Shift+Enter 换行</div>
              <div className="text-[10px] text-zinc-600 font-mono">context: 8k / 128k tokens</div>
            </div>
          </div>
        </div>

        {/* ═══ RIGHT: Agent Inspector ═══ */}
        <div className="w-[420px] flex-shrink-0 flex flex-col bg-surface-0 overflow-hidden">
          {/* Metrics Bar */}
          <div className="flex-shrink-0 px-4 pt-4 pb-3">
            <div className="grid grid-cols-4 gap-2.5">
              <MetricCard icon={Icon.Token} label="Tokens" value={totalTokens.toLocaleString()} sub="input: 18.2k · output: 6.6k" color="text-indigo-400" />
              <MetricCard icon={Icon.Clock} label="耗时" value={isThinking ? formatTime(elapsed) : '2.4s'} sub="avg: 1.8s / req" color="text-cyan-400" />
              <MetricCard icon={Icon.Layers} label="工具调用" value="12" sub="3 pending · 9 done" color="text-amber-400" />
              <MetricCard icon={Icon.Activity} label="吞吐量" value="42 t/s" sub="p50: 38 · p99: 51" color="text-emerald-400" />
            </div>
          </div>

          {/* Scrollable Panels */}
          <div className="flex-1 overflow-y-auto px-4 pb-4 space-y-4">

            {/* Thought Chain */}
            <div className="glass rounded-xl p-4 gradient-border">
              <SectionHeader icon={Icon.Brain} title="思考链 Thought Chain" count={thoughts.length} />
              <div className="space-y-0.5">
                {thoughts.map((t, i) => <ThoughtItem key={t.id} thought={t} index={i} />)}
              </div>
              {isThinking && (
                <div className="mt-3 flex items-center gap-2 text-[11px] text-indigo-400">
                  <span className="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-pulse-dot" />
                  <span className="typing-cursor">推理中</span>
                </div>
              )}
            </div>

            {/* MCP Tools */}
            <div className="glass rounded-xl p-4 gradient-border">
              <SectionHeader icon={Icon.Wrench} title="MCP 工具调用" count={tools.length} />
              <div className="space-y-2.5">
                {tools.map((t, i) => <ToolCard key={i} tool={t} index={i} />)}
              </div>
            </div>

            {/* Execution Timeline */}
            <div className="glass rounded-xl p-4 gradient-border">
              <SectionHeader icon={Icon.Activity} title="执行时间线" />
              <div className="space-y-2">
                {[
                  { label: '请求解析', start: 0, width: 8, color: 'bg-zinc-600' },
                  { label: '意图识别', start: 8, width: 15, color: 'bg-indigo-500/60' },
                  { label: 'weather_api', start: 25, width: 35, color: 'bg-cyan-500/60' },
                  { label: '数据分析', start: 62, width: 12, color: 'bg-amber-500/60' },
                  { label: 'chart_renderer', start: 76, width: 24, color: 'bg-indigo-500/60', active: true },
                ].map((item, i) => (
                  <div key={i} className="flex items-center gap-3 group">
                    <span className="text-[10px] text-zinc-500 w-20 text-right truncate">{item.label}</span>
                    <div className="flex-1 h-4 bg-surface-3 rounded-full overflow-hidden relative">
                      <div
                        className={`absolute top-0 left-0 h-full rounded-full ${item.color} transition-all duration-500 ${item.active ? 'animate-shimmer' : ''}`}
                        style={{ left: `${item.start}%`, width: `${item.width}%`, backgroundSize: '200% 100%' }}
                      />
                    </div>
                    <span className="text-[10px] text-zinc-600 font-mono w-10 text-right">
                      {item.active ? '...' : `${(item.start + item.width) * 30}ms`}
                    </span>
                  </div>
                ))}
              </div>
              <div className="mt-3 flex justify-between text-[10px] text-zinc-600 font-mono">
                <span>0ms</span>
                <span>2400ms</span>
              </div>
            </div>

            {/* System Info */}
            <div className="glass rounded-xl p-4 gradient-border">
              <SectionHeader icon={Icon.Terminal} title="系统信息" />
              <div className="grid grid-cols-2 gap-x-6 gap-y-2 text-[11px]">
                {[
                  ['Agent ID', 'agent-7f3a2b'],
                  ['模型', 'gpt-4o-2024-08-06'],
                  ['MCP 服务器', '3 / 3 在线'],
                  ['上下文窗口', '128,000 tokens'],
                  ['温度', '0.7'],
                  ['最大输出', '4,096 tokens'],
                  ['请求 ID', 'req-9c4e1d'],
                  ['会话 ID', 'sess-2a8f6b'],
                ].map(([k, v]) => (
                  <div key={k} className="flex justify-between">
                    <span className="text-zinc-500">{k}</span>
                    <span className="text-zinc-400 font-mono">{v}</span>
                  </div>
                ))}
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── Mount ─── */
ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
